<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoSignal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header>
      <div class="header-left">
        <div class="logo-mark">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="10" r="8" stroke="url(#grad)" stroke-width="1.5" fill="none"/>
            <circle cx="10" cy="10" r="3" fill="url(#grad)"/>
            <ellipse cx="10" cy="10" rx="8" ry="4" stroke="url(#grad)" stroke-width="0.8" fill="none" opacity="0.5"/>
            <defs>
              <linearGradient id="grad" x1="0" y1="0" x2="20" y2="20">
                <stop offset="0%" stop-color="#4a9eff"/>
                <stop offset="100%" stop-color="#a855f7"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1>GeoSignal</h1>
        <span class="tagline">Global Intelligence Feed</span>
      </div>
      <div class="header-right">
        <div class="live-indicator">
          <span class="live-dot"></span>
          <span class="live-text">LIVE</span>
        </div>
        <button id="refresh-btn" class="refresh-btn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M1.5 7a5.5 5.5 0 1 1 1.1 3.3"/>
            <path d="M1 4V7h3"/>
          </svg>
          Refresh
        </button>
      </div>
    </header>

    <div class="filters">
      <div class="filter-group">
        <label for="region-select">Region</label>
        <select id="region-select">
          <option value="Global">Global</option>
          <option value="Middle East">Middle East</option>
          <option value="South Asia">South Asia</option>
          <option value="Southeast Asia">Southeast Asia</option>
          <option value="Europe">Europe</option>
          <option value="Africa">Africa</option>
          <option value="Latin America">Latin America</option>
          <option value="East Asia">East Asia</option>
          <option value="North America">North America</option>
          <option value="Central Asia & Caucasus">Central Asia & Caucasus</option>
          <option value="Oceania">Oceania</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Sector</label>
        <div class="pill-group" id="sector-pills">
          <button class="pill active" data-value="Geopolitics">Geopolitics</button>
          <button class="pill active" data-value="Economy & Trade">Economy & Trade</button>
          <button class="pill active" data-value="Technology & AI">Technology & AI</button>
          <button class="pill active" data-value="Climate & Energy">Climate & Energy</button>
          <button class="pill active" data-value="Defence & Security">Defence & Security</button>
          <button class="pill active" data-value="Society & Culture">Society & Culture</button>
          <button class="pill active" data-value="Space & Frontier">Space & Frontier</button>
          <button class="pill active" data-value="Health & Biotech">Health & Biotech</button>
        </div>
      </div>

      <div class="filter-group">
        <label>Sources</label>
        <div class="pill-group" id="source-pills">
          <button class="pill active" data-value="Mainstream news">Mainstream</button>
          <button class="pill active" data-value="Think tanks & academic">Think Tanks</button>
          <button class="pill active" data-value="Independent journalism">Independent</button>
        </div>
      </div>
    </div>

    <div class="feed-header">
      <span class="feed-count" id="feed-count"></span>
      <span class="feed-timestamp" id="feed-timestamp"></span>
    </div>

    <main id="feed">
      <div class="loading-feed">
        <div class="loading-pulse"></div>
        <span>Scanning global signals&hellip;</span>
      </div>
    </main>

    <footer>
      <span>GeoSignal &mdash; Intelligence at the speed of now</span>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
